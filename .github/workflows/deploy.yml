name: Deploy to HuggingFace Spaces

# TRIGGER: This entire workflow fires automatically whenever code is pushed to the main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest  # GitHub gives us a free Linux VM to run this job on

    steps:
      # Step 1: Download our repository code onto the GitHub Actions runner VM
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # We need full git history for HF sync to work correctly
          lfs: true        # Large File Storage support for model weights

      # Step 2: Push our code directly to HuggingFace Spaces via git
      # HF Spaces is just a git repository under the hood!
      # We authenticate using the HF_TOKEN secret stored in GitHub → Settings → Secrets
      - name: Push to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "ci@github-actions.com"
          git config --global user.name "GitHub Actions"
          # Push to HF Spaces repo using token for authentication
          git push https://krishhsuri:${HF_TOKEN}@huggingface.co/spaces/krishhsuri/ai-financial-terminal main --force
